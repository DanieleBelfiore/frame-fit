name: Build FrameFit

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Build App
        working-directory: ./src
        run: go run fyne.io/fyne/v2/cmd/fyne@latest package -icon icon.png

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FrameFit-${{ runner.os }}
          path: |
            src/*.app/
            src/*.exe
            src/*.tar.xz
            src/*.tar.gz
