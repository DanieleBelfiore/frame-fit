name: Build and Release FrameFit

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: src/go.mod

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Build App
        working-directory: ./src
        run: go run fyne.io/tools/cmd/fyne@latest package -icon icon.png

      - name: Zip Mac App
        if: runner.os == 'macOS'
        working-directory: ./src
        run: zip -r FrameFit-Mac.zip FrameFit.app

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src/*.exe
            src/*.tar.xz
            src/FrameFit-Mac.zip
